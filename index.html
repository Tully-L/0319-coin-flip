<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Coin Flip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  #three-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── UI Overlay ── */
  #ui-overlay {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 20px;
  }

  #ui-overlay > * { pointer-events: auto; }

  #result {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    height: 36px;
    display: flex;
    align-items: center;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    pointer-events: none;
  }

  .glow-heads { color: #ffd700; }
  .glow-tails { color: #c0c0c0; }

  #hint {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    margin-bottom: 4px;
    pointer-events: none;
  }

  #stats {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 4px;
    pointer-events: none;
  }

  #history-bar {
    display: flex;
    gap: 3px;
    align-items: center;
    margin-bottom: 6px;
    max-width: 90vw;
    overflow-x: auto;
    padding: 4px 0;
  }

  .history-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    flex-shrink: 0;
    font-size: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    animation: pop-in 0.3s ease-out;
  }

  .history-dot.heads {
    background: linear-gradient(135deg, #ffd700, #daa520);
    color: #8b6914;
    box-shadow: 0 0 8px rgba(255,215,0,0.3);
  }

  .history-dot.tails {
    background: linear-gradient(135deg, #c0c0c0, #909090);
    color: #505050;
    box-shadow: 0 0 8px rgba(192,192,192,0.3);
  }

  @keyframes pop-in {
    0% { transform: scale(0); }
    80% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  #multi-flip {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  #multi-flip button {
    padding: 6px 14px;
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 8px;
    background: rgba(255,215,0,0.08);
    color: #ffd700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #multi-flip button:hover {
    background: rgba(255,215,0,0.2);
    border-color: rgba(255,215,0,0.5);
  }

  #multi-flip button:disabled { opacity: 0.3; cursor: not-allowed; }

  #multi-flip .reset-btn {
    border-color: rgba(255,100,100,0.3);
    color: #ff6b6b;
    background: rgba(255,100,100,0.08);
  }

  /* ── Webcam ── */
  #webcam-wrapper {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 20;
    cursor: grab;
    user-select: none;
  }

  #webcam-wrapper.dragging { cursor: grabbing; }

  #webcam-container {
    width: 220px;
    height: 165px;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15);
    background: #000;
    position: relative;
  }

  #webcam {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #gesture-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #webcam-toggle {
    position: absolute;
    top: 6px;
    left: 6px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #gesture-indicator {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-top: 6px;
    height: 18px;
  }

  #gesture-name {
    position: absolute;
    bottom: 6px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 2;
  }

  #sensitivity-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }

  #sensitivity-bar input[type=range] {
    width: 100px;
    accent-color: #ffd700;
    height: 4px;
  }

  /* ── Click area for coin ── */
  #coin-click-area {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 250px;
    height: 250px;
    border-radius: 50%;
    cursor: grab;
    z-index: 2;
  }

  #coin-click-area:active { cursor: grabbing; }

  /* ── Permission Overlay ── */
  #permission-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 20px;
  }

  #permission-overlay h2 {
    font-size: 28px;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #permission-overlay button {
    padding: 14px 36px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ffd700, #daa520);
    color: #1a1a2e;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }

  #permission-overlay button:hover { transform: scale(1.05); }

  #permission-overlay p {
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    max-width: 420px;
    text-align: center;
    line-height: 1.6;
  }

  .gesture-list {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    text-align: left;
    line-height: 1.8;
  }

  /* ── Screen Shake ── */
  @keyframes screen-shake {
    0%, 100% { transform: translate(0,0); }
    10% { transform: translate(-3px, 2px); }
    20% { transform: translate(3px, -2px); }
    30% { transform: translate(-2px, -3px); }
    40% { transform: translate(2px, 3px); }
    50% { transform: translate(-1px, 1px); }
  }
  body.shaking { animation: screen-shake 0.3s ease-out; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    #result { font-size: 28px; }
    #webcam-container { width: 150px; height: 112px; }
    #multi-flip button { padding: 5px 10px; font-size: 12px; }
    .history-dot { width: 14px; height: 14px; font-size: 7px; }
    #coin-click-area { width: 200px; height: 200px; }
  }
</style>
</head>
<body>

<canvas id="three-canvas"></canvas>
<div id="coin-click-area"></div>

<div id="permission-overlay">
  <h2>AI Coin Flip</h2>
  <p>Hand gesture controlled coin flipper with 3D rendering.</p>
  <div class="gesture-list">
    Swipe Up = Flip coin<br>
    Thumbs Up = Flip again<br>
    Fist = Reset stats
  </div>
  <button onclick="startCamera()">Enable Camera</button>
  <p style="font-size:12px; color:rgba(255,255,255,0.25)">Also supports click, tap, or Space key.</p>
</div>
<script>if(location.search.includes('test'))document.getElementById('permission-overlay').style.display='none';</script>

<div id="webcam-wrapper">
  <div id="webcam-container">
    <button id="webcam-toggle" onclick="toggleWebcam(event)">-</button>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="gesture-canvas"></canvas>
    <div id="gesture-name"></div>
  </div>
  <div id="gesture-indicator">Waiting for camera...</div>
  <div id="sensitivity-bar">
    <span>Sensitivity</span>
    <input type="range" id="sensitivity" min="5" max="25" value="15" oninput="updateSensitivity(this.value)">
  </div>
</div>

<div id="ui-overlay">
  <div id="result"></div>
  <div id="hint">Swipe up / Click coin / Space</div>
  <div id="stats"></div>
  <div id="history-bar"></div>
  <div id="multi-flip">
    <button onclick="multiFlip(5)">x5</button>
    <button onclick="multiFlip(10)">x10</button>
    <button onclick="multiFlip(20)">x20</button>
    <button class="reset-btn" onclick="resetStats()">Reset</button>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

<script>
// ══════════════════════════════════════
// Three.js Scene Setup
// ══════════════════════════════════════
var canvas = document.getElementById('three-canvas');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 7);
camera.lookAt(0, 0, 0);

// ── Lighting ──
var ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

// Symmetric lighting so both coin faces are well-lit
var keyLight = new THREE.DirectionalLight(0xfff5e0, 1.6);
keyLight.position.set(3, 4, 5);
scene.add(keyLight);

var keyLightBack = new THREE.DirectionalLight(0xfff5e0, 1.6);
keyLightBack.position.set(3, 4, -5);
scene.add(keyLightBack);

var fillLight = new THREE.DirectionalLight(0xc0d0ff, 0.6);
fillLight.position.set(-3, 2, 3);
scene.add(fillLight);

var fillLightBack = new THREE.DirectionalLight(0xc0d0ff, 0.6);
fillLightBack.position.set(-3, 2, -3);
scene.add(fillLightBack);

var topLight = new THREE.PointLight(0xffffff, 0.6, 20);
topLight.position.set(0, 5, 0);
scene.add(topLight);

// ── Environment Map (procedural) ──
function generateEnvMap() {
  var size = 256;
  var c = document.createElement('canvas');
  c.width = size;
  c.height = size;
  var ctx = c.getContext('2d');

  var grd = ctx.createLinearGradient(0, 0, 0, size);
  grd.addColorStop(0, '#1a1a3a');
  grd.addColorStop(0.3, '#2a2040');
  grd.addColorStop(0.5, '#3a3050');
  grd.addColorStop(0.7, '#4a4060');
  grd.addColorStop(1, '#1a1020');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, size, size);

  // Add some bright spots for reflections
  for (var i = 0; i < 15; i++) {
    var x = Math.random() * size;
    var y = Math.random() * size;
    var r = 5 + Math.random() * 20;
    var g2 = ctx.createRadialGradient(x, y, 0, x, y, r);
    g2.addColorStop(0, 'rgba(255,245,220,0.4)');
    g2.addColorStop(1, 'rgba(255,245,220,0)');
    ctx.fillStyle = g2;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
  }

  var tex = new THREE.CanvasTexture(c);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  return tex;
}

var envMap = generateEnvMap();
scene.environment = envMap;

// ── Coin Geometry ──
var COIN_RADIUS = 1.0;
var COIN_THICKNESS = 0.07;
var COIN_SEGMENTS = 128;

// Load textures
var textureLoader = new THREE.TextureLoader();

function generateNormalMapFromImage(imageSrc, callback) {
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    var size = 512;
    var c = document.createElement('canvas');
    c.width = size;
    c.height = size;
    var ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, size, size);
    var imageData = ctx.getImageData(0, 0, size, size);
    var data = imageData.data;

    // Convert to grayscale heightmap
    var heights = new Float32Array(size * size);
    for (var i = 0; i < size * size; i++) {
      var idx = i * 4;
      heights[i] = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114) / 255;
    }

    // Sobel filter to generate normal map
    var normalData = ctx.createImageData(size, size);
    var nd = normalData.data;
    var strength = 2.5;

    for (var y = 0; y < size; y++) {
      for (var x = 0; x < size; x++) {
        var idx = (y * size + x);

        var tl = heights[((y - 1 + size) % size) * size + ((x - 1 + size) % size)];
        var t = heights[((y - 1 + size) % size) * size + x];
        var tr = heights[((y - 1 + size) % size) * size + ((x + 1) % size)];
        var l = heights[y * size + ((x - 1 + size) % size)];
        var r2 = heights[y * size + ((x + 1) % size)];
        var bl = heights[((y + 1) % size) * size + ((x - 1 + size) % size)];
        var b = heights[((y + 1) % size) * size + x];
        var br = heights[((y + 1) % size) * size + ((x + 1) % size)];

        var dx = (tr + 2 * r2 + br) - (tl + 2 * l + bl);
        var dy = (bl + 2 * b + br) - (tl + 2 * t + tr);
        var dz = 1.0 / strength;

        var len = Math.sqrt(dx * dx + dy * dy + dz * dz);
        dx /= len;
        dy /= len;
        dz /= len;

        var pi = idx * 4;
        nd[pi] = Math.floor((dx * 0.5 + 0.5) * 255);
        nd[pi + 1] = Math.floor((dy * 0.5 + 0.5) * 255);
        nd[pi + 2] = Math.floor((dz * 0.5 + 0.5) * 255);
        nd[pi + 3] = 255;
      }
    }

    ctx.putImageData(normalData, 0, 0);
    var normalTex = new THREE.CanvasTexture(c);
    callback(normalTex);
  };
  img.src = imageSrc;
}

var coinGroup = new THREE.Group();
scene.add(coinGroup);

// Crop coin from source image (coin is ~37.4% of image, centered)
// Crop TIGHTER than the coin so it overfills the canvas - geometry clips to circle
function cropCoinTexture(src, callback) {
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    var size = 512;
    var c = document.createElement('canvas');
    c.width = size;
    c.height = size;
    var ctx = c.getContext('2d');

    // Fill with gold first as safety net
    ctx.fillStyle = '#c9a84c';
    ctx.fillRect(0, 0, size, size);

    // Crop at 0.35 (tighter than coin's 0.374) so coin OVERFLOWS canvas
    // This ensures no gold ring shows - geometry clips the excess
    var coinRatio = 0.38;
    var sx = img.width * (1 - coinRatio) / 2;
    var sy = img.height * (1 - coinRatio) / 2;
    var sw = img.width * coinRatio;
    var sh = img.height * coinRatio;

    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);

    var tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    callback(tex, c);
  };
  img.src = src;
}

// Build coin once textures are ready
var frontMat, backMat;

function buildCoin(fTex, bTex) {
  // Main coin body (closed cylinder)
  var coinGeom = new THREE.CylinderGeometry(COIN_RADIUS, COIN_RADIUS, COIN_THICKNESS, COIN_SEGMENTS, 1, false);

  var edgeMat = new THREE.MeshStandardMaterial({
    color: 0xdaa520,
    metalness: 0.95,
    roughness: 0.2,
    envMap: envMap,
    envMapIntensity: 1.2
  });

  frontMat = new THREE.MeshStandardMaterial({
    map: fTex,
    color: 0xffd700,
    metalness: 0.9,
    roughness: 0.25,
    envMap: envMap,
    envMapIntensity: 0.8
  });

  backMat = new THREE.MeshStandardMaterial({
    map: bTex,
    color: 0xffd700,
    metalness: 0.9,
    roughness: 0.25,
    envMap: envMap,
    envMapIntensity: 0.8
  });

  var coinMesh = new THREE.Mesh(coinGeom, [edgeMat, frontMat, backMat]);
  coinMesh.rotation.x = Math.PI / 2;
  coinGroup.add(coinMesh);

  // Reeded edge (齿纹) - small ridges around the coin edge
  var REED_COUNT = 150;
  var reedMat = new THREE.MeshStandardMaterial({
    color: 0xb8860b,
    metalness: 0.98,
    roughness: 0.15,
    envMap: envMap,
    envMapIntensity: 1.0
  });

  // Each reed is a small box placed radially around the edge
  var reedWidth = 0.008;
  var reedDepth = 0.012;
  var reedGeom = new THREE.BoxGeometry(reedWidth, COIN_THICKNESS * 0.85, reedDepth);

  // Use instanced mesh for performance
  var reedInstanced = new THREE.InstancedMesh(reedGeom, reedMat, REED_COUNT);
  var dummy = new THREE.Object3D();

  for (var i = 0; i < REED_COUNT; i++) {
    var angle = (i / REED_COUNT) * Math.PI * 2;
    var x = Math.cos(angle) * (COIN_RADIUS + reedDepth * 0.4);
    var z = Math.sin(angle) * (COIN_RADIUS + reedDepth * 0.4);
    dummy.position.set(x, 0, z);
    dummy.rotation.y = -angle;
    dummy.updateMatrix();
    reedInstanced.setMatrixAt(i, dummy.matrix);
  }

  reedInstanced.rotation.x = Math.PI / 2;
  coinGroup.add(reedInstanced);
}

// Load, crop, and build — store normal maps to apply after buildCoin
var loadedTextures = { front: null, back: null };
var pendingNormals = { front: null, back: null };

function applyNormalMaps() {
  if (pendingNormals.front && frontMat) {
    frontMat.normalMap = pendingNormals.front;
    frontMat.normalScale = new THREE.Vector2(1.5, 1.5);
    frontMat.needsUpdate = true;
  }
  if (pendingNormals.back && backMat) {
    backMat.normalMap = pendingNormals.back;
    backMat.normalScale = new THREE.Vector2(1.5, 1.5);
    backMat.needsUpdate = true;
  }
}

function tryBuildCoin() {
  if (loadedTextures.front && loadedTextures.back) {
    buildCoin(loadedTextures.front, loadedTextures.back);
    // Apply any normal maps that were generated before buildCoin
    applyNormalMaps();
  }
}

cropCoinTexture('assets/gold-front-hd.png', function(tex, canvas) {
  loadedTextures.front = tex;
  tryBuildCoin();
  generateNormalMapFromCanvas(canvas, function(nTex) {
    pendingNormals.front = nTex;
    applyNormalMaps();
  });
});

cropCoinTexture('assets/gold-back-hd.png', function(tex, canvas) {
  loadedTextures.back = tex;
  tryBuildCoin();
  generateNormalMapFromCanvas(canvas, function(nTex) {
    pendingNormals.back = nTex;
    applyNormalMaps();
  });
});

function generateNormalMapFromCanvas(srcCanvas, callback) {
  var size = srcCanvas.width;
  var ctx = srcCanvas.getContext('2d');
  var imageData = ctx.getImageData(0, 0, size, size);
  var data = imageData.data;

  var heights = new Float32Array(size * size);
  for (var i = 0; i < size * size; i++) {
    var idx = i * 4;
    heights[i] = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114) / 255;
  }

  var nc = document.createElement('canvas');
  nc.width = size; nc.height = size;
  var nctx = nc.getContext('2d');
  var normalData = nctx.createImageData(size, size);
  var nd = normalData.data;
  var strength = 2.5;

  for (var y = 0; y < size; y++) {
    for (var x = 0; x < size; x++) {
      var idx2 = y * size + x;
      var tl = heights[((y-1+size)%size)*size+((x-1+size)%size)];
      var t = heights[((y-1+size)%size)*size+x];
      var tr = heights[((y-1+size)%size)*size+((x+1)%size)];
      var l = heights[y*size+((x-1+size)%size)];
      var r2 = heights[y*size+((x+1)%size)];
      var bl = heights[((y+1)%size)*size+((x-1+size)%size)];
      var b = heights[((y+1)%size)*size+x];
      var br = heights[((y+1)%size)*size+((x+1)%size)];
      var ddx = (tr+2*r2+br)-(tl+2*l+bl);
      var ddy = (bl+2*b+br)-(tl+2*t+tr);
      var ddz = 1.0/strength;
      var len = Math.sqrt(ddx*ddx+ddy*ddy+ddz*ddz);
      var pi = idx2*4;
      nd[pi]   = Math.floor((ddx/len*0.5+0.5)*255);
      nd[pi+1] = Math.floor((ddy/len*0.5+0.5)*255);
      nd[pi+2] = Math.floor((ddz/len*0.5+0.5)*255);
      nd[pi+3] = 255;
    }
  }
  nctx.putImageData(normalData, 0, 0);
  callback(new THREE.CanvasTexture(nc));
}

// ══════════════════════════════════════
// Subtle shadow only
// ══════════════════════════════════════
var shadowCanvas = document.createElement('canvas');
shadowCanvas.width = 128;
shadowCanvas.height = 128;
var sCtx = shadowCanvas.getContext('2d');
var shadowGrad = sCtx.createRadialGradient(64, 64, 0, 64, 64, 50);
shadowGrad.addColorStop(0, 'rgba(255,200,50,0.06)');
shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
sCtx.fillStyle = shadowGrad;
sCtx.fillRect(0, 0, 128, 128);
var shadowTex = new THREE.CanvasTexture(shadowCanvas);
var shadowPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.MeshBasicMaterial({ map: shadowTex, transparent: true, depthWrite: false, opacity: 0.06 })
);
shadowPlane.rotation.x = -Math.PI / 2;
shadowPlane.position.y = -1.8;
scene.add(shadowPlane);

// Subtle sweep light for slow glint
var sweepLight = new THREE.PointLight(0xfff0d0, 0, 6);
sweepLight.position.set(2, 1, 3);
scene.add(sweepLight);
var sweepTime = 0;

// ══════════════════════════════════════
// Coin Animation State
// ══════════════════════════════════════
var isFlipping = false;
var coinRotation = { x: 0, y: 0 };
var idleTime = 0;
var totalHeads = 0;
var totalTails = 0;
var history = [];
var multiFlipQueue = 0;

var resultEl = document.getElementById('result');
var statsEl = document.getElementById('stats');
var historyBar = document.getElementById('history-bar');

// ── Mouse/Touch drag to rotate coin ──
var coinDrag = { active: false, prevX: 0, prevY: 0, velX: 0, velY: 0 };
var coinDragMoved = false;
var coinClickArea = document.getElementById('coin-click-area');

coinClickArea.addEventListener('mousedown', function(e) {
  if (isFlipping) return;
  coinDrag.active = true;
  coinDrag.prevX = e.clientX;
  coinDrag.prevY = e.clientY;
  coinDrag.velX = 0;
  coinDrag.velY = 0;
  coinDragMoved = false;
  e.preventDefault();
});

document.addEventListener('mousemove', function(e) {
  if (!coinDrag.active || isFlipping) return;
  var dx = e.clientX - coinDrag.prevX;
  var dy = e.clientY - coinDrag.prevY;
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) coinDragMoved = true;
  coinRotation.y += dx * 0.008;
  coinRotation.x += dy * 0.008;
  coinDrag.velX = dx * 0.008;
  coinDrag.velY = dy * 0.008;
  coinDrag.prevX = e.clientX;
  coinDrag.prevY = e.clientY;
});

document.addEventListener('mouseup', function() {
  coinDrag.active = false;
});

// Touch support for coin rotation
coinClickArea.addEventListener('touchstart', function(e) {
  if (isFlipping) return;
  coinDrag.active = true;
  coinDrag.prevX = e.touches[0].clientX;
  coinDrag.prevY = e.touches[0].clientY;
  coinDrag.velX = 0;
  coinDrag.velY = 0;
  coinDragMoved = false;
}, { passive: true });

document.addEventListener('touchmove', function(e) {
  if (!coinDrag.active || isFlipping) return;
  var dx = e.touches[0].clientX - coinDrag.prevX;
  var dy = e.touches[0].clientY - coinDrag.prevY;
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) coinDragMoved = true;
  coinRotation.y += dx * 0.01;
  coinRotation.x += dy * 0.01;
  coinDrag.velX = dx * 0.01;
  coinDrag.velY = dy * 0.01;
  coinDrag.prevX = e.touches[0].clientX;
  coinDrag.prevY = e.touches[0].clientY;
});

document.addEventListener('touchend', function() {
  coinDrag.active = false;
});

// Click to flip (only if not dragged)
coinClickArea.addEventListener('click', function() {
  if (!coinDragMoved) flipCoin();
});

// ── Idle wobble + specular sweep + drag momentum ──
function updateIdleWobble(dt) {
  if (isFlipping) return;
  idleTime += dt;

  // Apply drag momentum with friction
  if (!coinDrag.active) {
    coinRotation.x += coinDrag.velY;
    coinRotation.y += coinDrag.velX;
    coinDrag.velX *= 0.95;
    coinDrag.velY *= 0.95;
    if (Math.abs(coinDrag.velX) < 0.0001) coinDrag.velX = 0;
    if (Math.abs(coinDrag.velY) < 0.0001) coinDrag.velY = 0;
  }

  // Gentle idle wobble (only when not being dragged and no momentum)
  var wobbleScale = coinDrag.active || Math.abs(coinDrag.velX) > 0.001 || Math.abs(coinDrag.velY) > 0.001 ? 0 : 1;
  coinGroup.rotation.x = coinRotation.x + Math.sin(idleTime * 0.8) * 0.08 * wobbleScale;
  coinGroup.rotation.y = coinRotation.y + Math.sin(idleTime * 0.6) * 0.05 * wobbleScale;

  // Subtle sweep light - slow orbit for gentle glint
  sweepTime += dt * 0.2;
  var sweepIntensity = (Math.sin(sweepTime * 1.5) * 0.5 + 0.5) * 0.4;
  sweepLight.intensity = sweepIntensity;
  sweepLight.position.x = Math.cos(sweepTime) * 3;
  sweepLight.position.z = Math.sin(sweepTime) * 3;
  sweepLight.position.y = 1.5;
}

// ══════════════════════════════════════
// Audio (improved metallic coin sounds)
// ══════════════════════════════════════
var audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function createNoise(duration, volume) {
  var bufferSize = audioCtx.sampleRate * duration;
  var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  var data = buffer.getChannelData(0);
  for (var i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * volume;
  }
  return buffer;
}

function playFlipSound() {
  var t = audioCtx.currentTime;
  // Metallic whoosh
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  var filter = audioCtx.createBiquadFilter();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(600, t);
  osc.frequency.exponentialRampToValueAtTime(150, t + 0.2);
  filter.type = 'bandpass'; filter.frequency.value = 1500; filter.Q.value = 3;
  gain.gain.setValueAtTime(0.06, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.2);

  // Noise burst for "air" sound
  var noise = audioCtx.createBufferSource();
  noise.buffer = createNoise(0.15, 0.3);
  var nGain = audioCtx.createGain();
  var nFilter = audioCtx.createBiquadFilter();
  nFilter.type = 'highpass'; nFilter.frequency.value = 2000;
  nGain.gain.setValueAtTime(0.04, t);
  nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  noise.connect(nFilter); nFilter.connect(nGain); nGain.connect(audioCtx.destination);
  noise.start(t); noise.stop(t + 0.15);
}

function playSpinTick() {
  var t = audioCtx.currentTime;
  // Short metallic click
  var osc = audioCtx.createOscillator();
  var osc2 = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  var filter = audioCtx.createBiquadFilter();
  osc.type = 'sine'; osc.frequency.value = 3000 + Math.random() * 2000;
  osc2.type = 'triangle'; osc2.frequency.value = 5000 + Math.random() * 3000;
  filter.type = 'bandpass'; filter.frequency.value = 4000; filter.Q.value = 5;
  gain.gain.setValueAtTime(0.04, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
  osc.connect(filter); osc2.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc2.start(t);
  osc.stop(t + 0.02); osc2.stop(t + 0.02);
}

function playLandSound(isHeads) {
  var t = audioCtx.currentTime;
  // Primary metallic impact
  var osc1 = audioCtx.createOscillator();
  var osc2 = audioCtx.createOscillator();
  var osc3 = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  var filter = audioCtx.createBiquadFilter();
  osc1.type = 'triangle'; osc1.frequency.value = isHeads ? 880 : 740;
  osc2.type = 'sine'; osc2.frequency.value = isHeads ? 1760 : 1480;
  osc3.type = 'sine'; osc3.frequency.value = isHeads ? 3520 : 2960;
  filter.type = 'highpass'; filter.frequency.value = 300;
  gain.gain.setValueAtTime(0.18, t);
  gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  osc1.connect(filter); osc2.connect(filter); osc3.connect(filter);
  filter.connect(gain); gain.connect(audioCtx.destination);
  osc1.start(t); osc2.start(t); osc3.start(t);
  osc1.stop(t + 0.6); osc2.stop(t + 0.6); osc3.stop(t + 0.6);

  // Noise impact
  var noise = audioCtx.createBufferSource();
  noise.buffer = createNoise(0.08, 0.5);
  var nGain = audioCtx.createGain();
  var nFilter = audioCtx.createBiquadFilter();
  nFilter.type = 'bandpass'; nFilter.frequency.value = 3000; nFilter.Q.value = 1;
  nGain.gain.setValueAtTime(0.1, t);
  nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  noise.connect(nFilter); nFilter.connect(nGain); nGain.connect(audioCtx.destination);
  noise.start(t); noise.stop(t + 0.08);
}

function playBounceSound(volume) {
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = 600 + Math.random() * 400;
  gain.gain.setValueAtTime(volume * 0.12, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.1);

  var noise = audioCtx.createBufferSource();
  noise.buffer = createNoise(0.05, 0.3);
  var nGain = audioCtx.createGain();
  nGain.gain.setValueAtTime(volume * 0.06, t);
  nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  noise.connect(nGain); nGain.connect(audioCtx.destination);
  noise.start(t); noise.stop(t + 0.05);
}

// Coin Flip Logic
// ══════════════════════════════════════
function updateStats() {
  var total = totalHeads + totalTails;
  if (!total) { statsEl.textContent = ''; return; }
  var hPct = ((totalHeads / total) * 100).toFixed(1);
  var tPct = ((totalTails / total) * 100).toFixed(1);
  statsEl.textContent = 'H: ' + totalHeads + ' (' + hPct + '%)  |  T: ' + totalTails + ' (' + tPct + '%)  |  Total: ' + total;
}

function addHistory(isHeads) {
  history.push(isHeads);
  var dot = document.createElement('div');
  dot.className = 'history-dot ' + (isHeads ? 'heads' : 'tails');
  dot.textContent = isHeads ? 'H' : 'T';
  dot.title = '#' + history.length + ': ' + (isHeads ? 'Heads' : 'Tails');
  historyBar.appendChild(dot);
  historyBar.scrollLeft = historyBar.scrollWidth;
}

function screenShake() {
  document.body.classList.remove('shaking');
  void document.body.offsetWidth;
  document.body.classList.add('shaking');
  setTimeout(function() { document.body.classList.remove('shaking'); }, 300);
}

// 3D particle burst on landing
function spawnCoinParticles(isHeads) {
  var color = isHeads ? 0xffd700 : 0xc0c0c0;
  var count = 40;
  var burstGroup = new THREE.Group();
  scene.add(burstGroup);

  var geom = new THREE.SphereGeometry(0.02, 4, 4);
  var parts = [];
  for (var i = 0; i < count; i++) {
    var mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
    var mesh = new THREE.Mesh(geom, mat);
    mesh.position.copy(coinGroup.position);
    var angle = Math.random() * Math.PI * 2;
    var elev = (Math.random() - 0.5) * Math.PI;
    var speed = 2 + Math.random() * 4;
    burstGroup.add(mesh);
    parts.push({
      mesh: mesh,
      vx: Math.cos(angle) * Math.cos(elev) * speed,
      vy: Math.sin(elev) * speed + 1,
      vz: Math.sin(angle) * Math.cos(elev) * speed,
      life: 1
    });
  }

  var startTime = performance.now();
  function animateParticles() {
    var elapsed = (performance.now() - startTime) / 1000;
    var alive = false;
    parts.forEach(function(p) {
      p.life -= 0.02;
      if (p.life <= 0) { p.mesh.visible = false; return; }
      alive = true;
      p.vy -= 0.08; // gravity
      p.mesh.position.x += p.vx * 0.016;
      p.mesh.position.y += p.vy * 0.016;
      p.mesh.position.z += p.vz * 0.016;
      p.mesh.material.opacity = p.life;
    });
    if (alive) {
      requestAnimationFrame(animateParticles);
    } else {
      scene.remove(burstGroup);
    }
  }
  animateParticles();
}

var tickCount = 0;
var COIN_REST_Y = -0.1; // resting Y position

function flipCoin() {
  if (isFlipping) return;
  isFlipping = true;
  resultEl.textContent = '';
  tickCount = 0;
  coinDrag.velX = 0;
  coinDrag.velY = 0;

  if (audioCtx.state === 'suspended') audioCtx.resume();
  playFlipSound();

  var isHeads = Math.random() < 0.5;
  var fullSpins = (6 + Math.floor(Math.random() * 5)) * Math.PI * 2;
  var finalAngle = isHeads ? 0 : Math.PI;
  var targetX = coinRotation.x + fullSpins + finalAngle - (coinRotation.x % (Math.PI * 2));
  var wobbleY = (Math.random() - 0.5) * 0.8;
  var targetY = wobbleY;

  // Phase 1: Launch upward (0 -> 0.45)
  // Phase 2: Fall down (0.45 -> 0.7)
  // Phase 3: Bounce 1 (0.7 -> 0.85)
  // Phase 4: Bounce 2 (0.85 -> 0.95)
  // Phase 5: Settle (0.95 -> 1.0)

  var duration = 2500;
  var startTime = performance.now();
  var startX = coinRotation.x;
  var startY = coinRotation.y;
  var launchHeight = 2.5;
  var bounce1Height = 0.2;
  var bounce2Height = 0.06;
  var landedOnce = false;
  var landedTwice = false;
  var landedThrice = false;

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeInCubic(t) { return t * t * t; }

  function getHeight(progress) {
    if (progress < 0.45) {
      // Launch: parabolic up and down
      var p = progress / 0.45;
      return Math.sin(p * Math.PI) * launchHeight;
    } else if (progress < 0.7) {
      // First fall to ground
      var p = (progress - 0.45) / 0.25;
      return 0;
    } else if (progress < 0.85) {
      // Bounce 1
      var p = (progress - 0.7) / 0.15;
      return Math.sin(p * Math.PI) * bounce1Height;
    } else if (progress < 0.95) {
      // Bounce 2
      var p = (progress - 0.85) / 0.1;
      return Math.sin(p * Math.PI) * bounce2Height;
    } else {
      // Settle
      var p = (progress - 0.95) / 0.05;
      return Math.sin(p * Math.PI) * 0.03;
    }
  }

  function getRotationProgress(progress) {
    // Most rotation happens during launch, slows during bounces
    if (progress < 0.7) {
      return easeOutCubic(progress / 0.7);
    } else {
      return 1.0;
    }
  }

  function animateFlip() {
    var elapsed = performance.now() - startTime;
    var progress = Math.min(elapsed / duration, 1);

    var rotP = getRotationProgress(progress);
    var rx = startX + (targetX - startX) * rotP;
    var ry = startY + (targetY - startY) * rotP;
    var height = getHeight(progress);

    coinGroup.rotation.x = rx;
    coinGroup.rotation.y = ry;
    coinGroup.position.y = COIN_REST_Y + height;

    // Shadow fades when coin is high
    shadowPlane.material.opacity = Math.max(0.02, 0.06 - height * 0.02);

    // Tick sounds during spin phase
    var currentTick = Math.floor(rx / (Math.PI / 2));
    if (currentTick > tickCount && progress < 0.65) {
      tickCount = currentTick;
      playSpinTick();
    }

    // Dynamic light
    var flicker = 1.6 + Math.sin(rx * 2) * 0.4;
    keyLight.intensity = flicker;
    keyLightBack.intensity = flicker;

    // Bounce sound triggers
    if (progress >= 0.45 && !landedOnce) {
      landedOnce = true;
      playLandSound(isHeads);
      screenShake();
    }
    if (progress >= 0.7 && progress < 0.71 && !landedTwice) {
      landedTwice = true;
      playBounceSound(0.6);
    }
    if (progress >= 0.85 && progress < 0.86 && !landedThrice) {
      landedThrice = true;
      playBounceSound(0.3);
    }

    if (progress < 1) {
      requestAnimationFrame(animateFlip);
    } else {
      coinRotation.x = targetX;
      coinRotation.y = targetY;
      coinGroup.position.y = COIN_REST_Y;
      isFlipping = false;

      spawnCoinParticles(isHeads);

      shadowPlane.material.opacity = 0.06;

      if (isHeads) {
        totalHeads++;
        resultEl.innerHTML = '<span class="glow-heads">HEADS</span>';
      } else {
        totalTails++;
        resultEl.innerHTML = '<span class="glow-tails">TAILS</span>';
      }

      addHistory(isHeads);
      updateStats();

      keyLight.intensity = 1.6;
      keyLightBack.intensity = 1.6;

      if (multiFlipQueue > 0) {
        multiFlipQueue--;
        setTimeout(flipCoin, 400);
      }
    }
  }
  requestAnimationFrame(animateFlip);
}

function multiFlip(n) {
  if (isFlipping) return;
  multiFlipQueue = n - 1;
  flipCoin();
}

function resetStats() {
  if (isFlipping) return;
  totalHeads = 0; totalTails = 0; history = [];
  historyBar.innerHTML = '';
  statsEl.textContent = '';
  resultEl.textContent = '';
}

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') { e.preventDefault(); flipCoin(); }
});

// ══════════════════════════════════════
// Gesture Detection (MediaPipe Hands)
// ══════════════════════════════════════
var video = document.getElementById('webcam');
var gCanvas = document.getElementById('gesture-canvas');
var gCtx = gCanvas.getContext('2d');
var indicator = document.getElementById('gesture-indicator');
var gestureName = document.getElementById('gesture-name');

var handHistory = [];
var HISTORY_LEN = 8;
var swipeThreshold = 0.15;
var lastFlipTime = 0;
var COOLDOWN = 1500;
var lastGesture = '';
var gestureHoldStart = 0;

function updateSensitivity(val) {
  swipeThreshold = (30 - parseInt(val)) / 100;
}

function countFingersUp(lm) {
  var count = 0;
  if (lm[8].y < lm[6].y) count++;
  if (lm[12].y < lm[10].y) count++;
  if (lm[16].y < lm[14].y) count++;
  if (lm[20].y < lm[18].y) count++;
  return count;
}

function isThumbUp(lm) {
  var thumbUp = lm[4].y < lm[3].y - 0.04;
  var fingersCurled = lm[8].y > lm[6].y && lm[12].y > lm[10].y && lm[16].y > lm[14].y && lm[20].y > lm[18].y;
  return thumbUp && fingersCurled;
}

function isFist(lm) {
  return lm[8].y > lm[6].y && lm[12].y > lm[10].y && lm[16].y > lm[14].y && lm[20].y > lm[18].y && lm[4].y > lm[2].y;
}

var trailPoints = [];
var MAX_TRAIL = 15;

function drawTrail() {
  if (trailPoints.length < 2) return;
  gCtx.save();
  gCtx.beginPath();
  gCtx.moveTo(trailPoints[0].x, trailPoints[0].y);
  for (var i = 1; i < trailPoints.length; i++) {
    gCtx.lineTo(trailPoints[i].x, trailPoints[i].y);
  }
  gCtx.strokeStyle = 'rgba(255,215,0,0.6)';
  gCtx.lineWidth = 3;
  gCtx.lineCap = 'round';
  gCtx.shadowColor = '#ffd700';
  gCtx.shadowBlur = 8;
  gCtx.stroke();
  gCtx.restore();
}

function onResults(results) {
  var w = gCanvas.width = gCanvas.offsetWidth;
  var h = gCanvas.height = gCanvas.offsetHeight;
  gCtx.clearRect(0, 0, w, h);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    var landmarks = results.multiHandLandmarks[0];

    gCtx.save();
    gCtx.scale(w, h);
    drawConnectors(gCtx, landmarks, HAND_CONNECTIONS, { color: 'rgba(255,215,0,0.4)', lineWidth: 0.004 });
    drawLandmarks(gCtx, landmarks, { color: '#ffd700', lineWidth: 0.002, radius: 0.006 });
    gCtx.restore();

    trailPoints.push({ x: landmarks[0].x * w, y: landmarks[0].y * h });
    if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
    drawTrail();

    var wristY = landmarks[0].y;
    var now = Date.now();
    handHistory.push({ y: wristY, t: now });
    if (handHistory.length > HISTORY_LEN) handHistory.shift();

    if (handHistory.length >= 4) {
      var oldest = handHistory[0];
      var newest = handHistory[handHistory.length - 1];
      var dy = oldest.y - newest.y;
      var dt = newest.t - oldest.t;
      if (dy > swipeThreshold && dt < 600 && (now - lastFlipTime) > COOLDOWN) {
        lastFlipTime = now;
        handHistory = [];
        flipCoin();
        gestureName.textContent = 'SWIPE UP';
        indicator.textContent = 'Flipping!';
        lastGesture = 'swipe';
        return;
      }
    }

    if (isThumbUp(landmarks)) {
      gestureName.textContent = 'THUMBS UP';
      if (lastGesture !== 'thumbsup') { gestureHoldStart = now; lastGesture = 'thumbsup'; }
      if (now - gestureHoldStart > 600 && (now - lastFlipTime) > COOLDOWN) {
        lastFlipTime = now;
        flipCoin();
        indicator.textContent = 'Thumbs up! Flipping!';
        gestureHoldStart = now;
      } else {
        indicator.textContent = 'Hold thumbs up to flip...';
      }
      return;
    }

    if (isFist(landmarks)) {
      gestureName.textContent = 'FIST';
      if (lastGesture !== 'fist') { gestureHoldStart = now; lastGesture = 'fist'; }
      if (now - gestureHoldStart > 1000 && !isFlipping) {
        resetStats();
        indicator.textContent = 'Stats reset!';
        gestureHoldStart = now + 3000;
      } else {
        indicator.textContent = 'Hold fist to reset...';
      }
      return;
    }

    var fingersUp = countFingersUp(landmarks);
    if (fingersUp >= 4) {
      gestureName.textContent = 'OPEN HAND';
      indicator.textContent = 'Swipe UP to flip!';
    } else {
      gestureName.textContent = '';
      indicator.textContent = 'Show a gesture...';
    }
    lastGesture = 'open';

  } else {
    gestureName.textContent = '';
    indicator.textContent = 'No hand detected';
    handHistory = [];
    trailPoints = [];
    lastGesture = '';
  }
}

function initHands() {
  var hands = new Hands({
    locateFile: function(file) {
      return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/' + file;
    }
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5
  });
  hands.onResults(onResults);

  var cam = new Camera(video, {
    onFrame: async function() { await hands.send({ image: video }); },
    width: 320,
    height: 240,
    facingMode: 'user'
  });
  cam.start();
  indicator.textContent = 'Detecting hands...';
}

async function startCamera() {
  document.getElementById('permission-overlay').style.display = 'none';
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 320, height: 240 }
    });
    video.srcObject = stream;
    await video.play();
    initHands();
  } catch(e) {
    indicator.textContent = 'Camera denied. Use click/space.';
    console.error(e);
  }
}
</script>
