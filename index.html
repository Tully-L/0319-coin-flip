<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Coin Flip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  #three-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── UI Overlay ── */
  #ui-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 40px;
  }

  #ui-overlay > * { pointer-events: auto; }

  #result {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 12px;
    height: 50px;
    display: flex;
    align-items: center;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    pointer-events: none;
  }

  .glow-heads { color: #ffd700; }
  .glow-tails { color: #c0c0c0; }

  #hint {
    font-size: 14px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 10px;
    pointer-events: none;
  }

  #stats {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 8px;
    pointer-events: none;
  }

  #history-bar {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-bottom: 12px;
    max-width: 90vw;
    overflow-x: auto;
    padding: 4px 0;
  }

  .history-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    flex-shrink: 0;
    font-size: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    animation: pop-in 0.3s ease-out;
  }

  .history-dot.heads {
    background: linear-gradient(135deg, #ffd700, #daa520);
    color: #8b6914;
    box-shadow: 0 0 8px rgba(255,215,0,0.3);
  }

  .history-dot.tails {
    background: linear-gradient(135deg, #c0c0c0, #909090);
    color: #505050;
    box-shadow: 0 0 8px rgba(192,192,192,0.3);
  }

  @keyframes pop-in {
    0% { transform: scale(0); }
    80% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  #multi-flip {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  #multi-flip button {
    padding: 6px 14px;
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 8px;
    background: rgba(255,215,0,0.08);
    color: #ffd700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #multi-flip button:hover {
    background: rgba(255,215,0,0.2);
    border-color: rgba(255,215,0,0.5);
  }

  #multi-flip button:disabled { opacity: 0.3; cursor: not-allowed; }

  #multi-flip .reset-btn {
    border-color: rgba(255,100,100,0.3);
    color: #ff6b6b;
    background: rgba(255,100,100,0.08);
  }

  /* ── Webcam ── */
  #webcam-wrapper {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 20;
    cursor: grab;
    user-select: none;
  }

  #webcam-wrapper.dragging { cursor: grabbing; }

  #webcam-container {
    width: 220px;
    height: 165px;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15);
    background: #000;
    position: relative;
  }

  #webcam {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #gesture-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #webcam-toggle {
    position: absolute;
    top: 6px;
    left: 6px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #gesture-indicator {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-top: 6px;
    height: 18px;
  }

  #gesture-name {
    position: absolute;
    bottom: 6px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 2;
  }

  #sensitivity-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }

  #sensitivity-bar input[type=range] {
    width: 100px;
    accent-color: #ffd700;
    height: 4px;
  }

  /* ── Click area for coin ── */
  #coin-click-area {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 250px;
    height: 250px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 2;
  }

  /* ── Permission Overlay ── */
  #permission-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 20px;
  }

  #permission-overlay h2 {
    font-size: 28px;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #permission-overlay button {
    padding: 14px 36px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ffd700, #daa520);
    color: #1a1a2e;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }

  #permission-overlay button:hover { transform: scale(1.05); }

  #permission-overlay p {
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    max-width: 420px;
    text-align: center;
    line-height: 1.6;
  }

  .gesture-list {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    text-align: left;
    line-height: 1.8;
  }

  /* ── Screen Shake ── */
  @keyframes screen-shake {
    0%, 100% { transform: translate(0,0); }
    10% { transform: translate(-3px, 2px); }
    20% { transform: translate(3px, -2px); }
    30% { transform: translate(-2px, -3px); }
    40% { transform: translate(2px, 3px); }
    50% { transform: translate(-1px, 1px); }
  }
  body.shaking { animation: screen-shake 0.3s ease-out; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    #result { font-size: 28px; }
    #webcam-container { width: 150px; height: 112px; }
    #multi-flip button { padding: 5px 10px; font-size: 12px; }
    .history-dot { width: 14px; height: 14px; font-size: 7px; }
    #coin-click-area { width: 200px; height: 200px; }
  }
</style>
</head>
<body>

<canvas id="three-canvas"></canvas>
<div id="coin-click-area" onclick="flipCoin()"></div>

<div id="permission-overlay">
  <h2>AI Coin Flip</h2>
  <p>Hand gesture controlled coin flipper with 3D rendering.</p>
  <div class="gesture-list">
    Swipe Up = Flip coin<br>
    Thumbs Up = Flip again<br>
    Fist = Reset stats
  </div>
  <button onclick="startCamera()">Enable Camera</button>
  <p style="font-size:12px; color:rgba(255,255,255,0.25)">Also supports click, tap, or Space key.</p>
</div>

<div id="webcam-wrapper">
  <div id="webcam-container">
    <button id="webcam-toggle" onclick="toggleWebcam(event)">-</button>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="gesture-canvas"></canvas>
    <div id="gesture-name"></div>
  </div>
  <div id="gesture-indicator">Waiting for camera...</div>
  <div id="sensitivity-bar">
    <span>Sensitivity</span>
    <input type="range" id="sensitivity" min="5" max="25" value="15" oninput="updateSensitivity(this.value)">
  </div>
</div>

<div id="ui-overlay">
  <div id="result"></div>
  <div id="hint">Swipe up / Click coin / Space</div>
  <div id="stats"></div>
  <div id="history-bar"></div>
  <div id="multi-flip">
    <button onclick="multiFlip(5)">x5</button>
    <button onclick="multiFlip(10)">x10</button>
    <button onclick="multiFlip(20)">x20</button>
    <button class="reset-btn" onclick="resetStats()">Reset</button>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

<script>
// ══════════════════════════════════════
// Three.js Scene Setup
// ══════════════════════════════════════
var canvas = document.getElementById('three-canvas');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);
camera.lookAt(0, 0, 0);

// ── Lighting ──
var ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

var keyLight = new THREE.DirectionalLight(0xfff5e0, 1.8);
keyLight.position.set(3, 4, 5);
scene.add(keyLight);

var fillLight = new THREE.DirectionalLight(0xc0d0ff, 0.6);
fillLight.position.set(-3, 2, 3);
scene.add(fillLight);

var rimLight = new THREE.DirectionalLight(0xffd700, 0.8);
rimLight.position.set(0, -3, -2);
scene.add(rimLight);

var topLight = new THREE.PointLight(0xffffff, 0.5, 20);
topLight.position.set(0, 5, 2);
scene.add(topLight);

// ── Environment Map (procedural) ──
function generateEnvMap() {
  var size = 256;
  var c = document.createElement('canvas');
  c.width = size;
  c.height = size;
  var ctx = c.getContext('2d');

  var grd = ctx.createLinearGradient(0, 0, 0, size);
  grd.addColorStop(0, '#1a1a3a');
  grd.addColorStop(0.3, '#2a2040');
  grd.addColorStop(0.5, '#3a3050');
  grd.addColorStop(0.7, '#4a4060');
  grd.addColorStop(1, '#1a1020');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, size, size);

  // Add some bright spots for reflections
  for (var i = 0; i < 15; i++) {
    var x = Math.random() * size;
    var y = Math.random() * size;
    var r = 5 + Math.random() * 20;
    var g2 = ctx.createRadialGradient(x, y, 0, x, y, r);
    g2.addColorStop(0, 'rgba(255,245,220,0.4)');
    g2.addColorStop(1, 'rgba(255,245,220,0)');
    ctx.fillStyle = g2;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
  }

  var tex = new THREE.CanvasTexture(c);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  return tex;
}

var envMap = generateEnvMap();
scene.environment = envMap;

// ── Coin Geometry ──
var COIN_RADIUS = 1.0;
var COIN_THICKNESS = 0.09;
var COIN_SEGMENTS = 128;

// Load textures
var textureLoader = new THREE.TextureLoader();

function generateNormalMapFromImage(imageSrc, callback) {
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    var size = 512;
    var c = document.createElement('canvas');
    c.width = size;
    c.height = size;
    var ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, size, size);
    var imageData = ctx.getImageData(0, 0, size, size);
    var data = imageData.data;

    // Convert to grayscale heightmap
    var heights = new Float32Array(size * size);
    for (var i = 0; i < size * size; i++) {
      var idx = i * 4;
      heights[i] = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114) / 255;
    }

    // Sobel filter to generate normal map
    var normalData = ctx.createImageData(size, size);
    var nd = normalData.data;
    var strength = 2.5;

    for (var y = 0; y < size; y++) {
      for (var x = 0; x < size; x++) {
        var idx = (y * size + x);

        var tl = heights[((y - 1 + size) % size) * size + ((x - 1 + size) % size)];
        var t = heights[((y - 1 + size) % size) * size + x];
        var tr = heights[((y - 1 + size) % size) * size + ((x + 1) % size)];
        var l = heights[y * size + ((x - 1 + size) % size)];
        var r2 = heights[y * size + ((x + 1) % size)];
        var bl = heights[((y + 1) % size) * size + ((x - 1 + size) % size)];
        var b = heights[((y + 1) % size) * size + x];
        var br = heights[((y + 1) % size) * size + ((x + 1) % size)];

        var dx = (tr + 2 * r2 + br) - (tl + 2 * l + bl);
        var dy = (bl + 2 * b + br) - (tl + 2 * t + tr);
        var dz = 1.0 / strength;

        var len = Math.sqrt(dx * dx + dy * dy + dz * dz);
        dx /= len;
        dy /= len;
        dz /= len;

        var pi = idx * 4;
        nd[pi] = Math.floor((dx * 0.5 + 0.5) * 255);
        nd[pi + 1] = Math.floor((dy * 0.5 + 0.5) * 255);
        nd[pi + 2] = Math.floor((dz * 0.5 + 0.5) * 255);
        nd[pi + 3] = 255;
      }
    }

    ctx.putImageData(normalData, 0, 0);
    var normalTex = new THREE.CanvasTexture(c);
    callback(normalTex);
  };
  img.src = imageSrc;
}

var coinGroup = new THREE.Group();
scene.add(coinGroup);

// Front face (Hidalgo portrait) - this is the "heads" side
var frontTex = textureLoader.load('assets/gold-front-hd.png');
frontTex.colorSpace = THREE.SRGBColorSpace;

// Back face (Eagle coat of arms) - this is the "tails" side
var backTex = textureLoader.load('assets/gold-back-hd.png');
backTex.colorSpace = THREE.SRGBColorSpace;

// Create coin body (cylinder for the edge)
var edgeGeom = new THREE.CylinderGeometry(COIN_RADIUS, COIN_RADIUS, COIN_THICKNESS, COIN_SEGMENTS, 1, true);
var edgeMat = new THREE.MeshStandardMaterial({
  color: 0xdaa520,
  metalness: 0.95,
  roughness: 0.25,
  envMap: envMap,
  envMapIntensity: 1.0
});
var edgeMesh = new THREE.Mesh(edgeGeom, edgeMat);
edgeMesh.rotation.x = Math.PI / 2; // Align cylinder with Z axis
coinGroup.add(edgeMesh);

// Add ridges on the edge
var ridgeGeom = new THREE.CylinderGeometry(COIN_RADIUS * 1.003, COIN_RADIUS * 1.003, COIN_THICKNESS * 0.9, COIN_SEGMENTS, 1, true);
var ridgeMat = new THREE.MeshStandardMaterial({
  color: 0xb8860b,
  metalness: 0.98,
  roughness: 0.15,
  envMap: envMap,
  wireframe: false,
  transparent: true,
  opacity: 0.3
});
var ridgeMesh = new THREE.Mesh(ridgeGeom, ridgeMat);
ridgeMesh.rotation.x = Math.PI / 2;
coinGroup.add(ridgeMesh);

// Front face disc
var faceGeom = new THREE.CircleGeometry(COIN_RADIUS * 0.98, COIN_SEGMENTS);
var frontMat = new THREE.MeshStandardMaterial({
  map: frontTex,
  metalness: 0.85,
  roughness: 0.3,
  envMap: envMap,
  envMapIntensity: 0.6,
  color: 0xffd700
});
var frontMesh = new THREE.Mesh(faceGeom, frontMat);
frontMesh.position.z = COIN_THICKNESS / 2 + 0.001;
coinGroup.add(frontMesh);

// Back face disc
var backGeom = new THREE.CircleGeometry(COIN_RADIUS * 0.98, COIN_SEGMENTS);
var backMat = new THREE.MeshStandardMaterial({
  map: backTex,
  metalness: 0.85,
  roughness: 0.3,
  envMap: envMap,
  envMapIntensity: 0.6,
  color: 0xffd700
});
var backMesh = new THREE.Mesh(backGeom, backMat);
backMesh.position.z = -(COIN_THICKNESS / 2 + 0.001);
backMesh.rotation.y = Math.PI;
coinGroup.add(backMesh);

// Apply normal maps when generated
generateNormalMapFromImage('assets/gold-front-hd.png', function(normalTex) {
  frontMat.normalMap = normalTex;
  frontMat.normalScale = new THREE.Vector2(1.5, 1.5);
  frontMat.needsUpdate = true;
});

generateNormalMapFromImage('assets/gold-back-hd.png', function(normalTex) {
  backMat.normalMap = normalTex;
  backMat.normalScale = new THREE.Vector2(1.5, 1.5);
  backMat.needsUpdate = true;
});

// No torus rim - clean coin edge
// No ambient particles - clean black background

// ══════════════════════════════════════
// Coin Animation State
// ══════════════════════════════════════
var isFlipping = false;
var coinRotation = { x: 0, y: 0 };
var idleTime = 0;
var totalHeads = 0;
var totalTails = 0;
var history = [];
var multiFlipQueue = 0;

var resultEl = document.getElementById('result');
var statsEl = document.getElementById('stats');
var historyBar = document.getElementById('history-bar');

// ── Idle wobble ──
function updateIdleWobble(dt) {
  if (isFlipping) return;
  idleTime += dt;
  coinGroup.rotation.x = coinRotation.x + Math.sin(idleTime * 0.8) * 0.08;
  coinGroup.rotation.y = coinRotation.y + Math.sin(idleTime * 0.6) * 0.05;
}

// ══════════════════════════════════════
// Audio
// ══════════════════════════════════════
var audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playFlipSound() {
  var d = 0.15;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  var filter = audioCtx.createBiquadFilter();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + d);
  filter.type = 'bandpass'; filter.frequency.value = 1200; filter.Q.value = 2;
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
  osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + d);
}

function playSpinTick() {
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = 'sine'; osc.frequency.value = 2000 + Math.random() * 1000;
  gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.03);
}

function playLandSound(isHeads) {
  var t = audioCtx.currentTime;
  var osc1 = audioCtx.createOscillator();
  var osc2 = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  var filter = audioCtx.createBiquadFilter();
  osc1.type = 'triangle'; osc1.frequency.value = isHeads ? 880 : 660;
  osc2.type = 'sine'; osc2.frequency.value = isHeads ? 1760 : 1320;
  filter.type = 'highpass'; filter.frequency.value = 400;
  gain.gain.setValueAtTime(0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc1.connect(filter); osc2.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  osc1.start(t); osc2.start(t); osc1.stop(t + 0.4); osc2.stop(t + 0.4);
  setTimeout(function() {
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = isHeads ? 660 : 500;
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.15);
  }, 120);
}

// ══════════════════════════════════════
// Coin Flip Logic
// ══════════════════════════════════════
function updateStats() {
  var total = totalHeads + totalTails;
  if (!total) { statsEl.textContent = ''; return; }
  var hPct = ((totalHeads / total) * 100).toFixed(1);
  var tPct = ((totalTails / total) * 100).toFixed(1);
  statsEl.textContent = 'H: ' + totalHeads + ' (' + hPct + '%)  |  T: ' + totalTails + ' (' + tPct + '%)  |  Total: ' + total;
}

function addHistory(isHeads) {
  history.push(isHeads);
  var dot = document.createElement('div');
  dot.className = 'history-dot ' + (isHeads ? 'heads' : 'tails');
  dot.textContent = isHeads ? 'H' : 'T';
  dot.title = '#' + history.length + ': ' + (isHeads ? 'Heads' : 'Tails');
  historyBar.appendChild(dot);
  historyBar.scrollLeft = historyBar.scrollWidth;
}

function screenShake() {
  document.body.classList.remove('shaking');
  void document.body.offsetWidth;
  document.body.classList.add('shaking');
  setTimeout(function() { document.body.classList.remove('shaking'); }, 300);
}

// 3D particle burst on landing
function spawnCoinParticles(isHeads) {
  var color = isHeads ? 0xffd700 : 0xc0c0c0;
  var count = 40;
  var burstGroup = new THREE.Group();
  scene.add(burstGroup);

  var geom = new THREE.SphereGeometry(0.02, 4, 4);
  var parts = [];
  for (var i = 0; i < count; i++) {
    var mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
    var mesh = new THREE.Mesh(geom, mat);
    mesh.position.copy(coinGroup.position);
    var angle = Math.random() * Math.PI * 2;
    var elev = (Math.random() - 0.5) * Math.PI;
    var speed = 2 + Math.random() * 4;
    burstGroup.add(mesh);
    parts.push({
      mesh: mesh,
      vx: Math.cos(angle) * Math.cos(elev) * speed,
      vy: Math.sin(elev) * speed + 1,
      vz: Math.sin(angle) * Math.cos(elev) * speed,
      life: 1
    });
  }

  var startTime = performance.now();
  function animateParticles() {
    var elapsed = (performance.now() - startTime) / 1000;
    var alive = false;
    parts.forEach(function(p) {
      p.life -= 0.02;
      if (p.life <= 0) { p.mesh.visible = false; return; }
      alive = true;
      p.vy -= 0.08; // gravity
      p.mesh.position.x += p.vx * 0.016;
      p.mesh.position.y += p.vy * 0.016;
      p.mesh.position.z += p.vz * 0.016;
      p.mesh.material.opacity = p.life;
    });
    if (alive) {
      requestAnimationFrame(animateParticles);
    } else {
      scene.remove(burstGroup);
    }
  }
  animateParticles();
}

var tickCount = 0;

function flipCoin() {
  if (isFlipping) return;
  isFlipping = true;
  resultEl.textContent = '';
  tickCount = 0;

  if (audioCtx.state === 'suspended') audioCtx.resume();
  playFlipSound();

  var isHeads = Math.random() < 0.5;
  // Heads: front face up (rotation.x = 0 mod 2PI)
  // Tails: back face up (rotation.x = PI mod 2PI)
  var fullSpins = (6 + Math.floor(Math.random() * 5)) * Math.PI * 2;
  var finalAngle = isHeads ? 0 : Math.PI;
  var targetX = coinRotation.x + fullSpins + finalAngle - (coinRotation.x % (Math.PI * 2));
  var wobbleY = (Math.random() - 0.5) * 0.8;
  var targetY = wobbleY;

  var duration = 2000;
  var startTime = performance.now();
  var startX = coinRotation.x;
  var startY = coinRotation.y;
  var startPosY = coinGroup.position.y;

  function easeOutBack(t) {
    var c1 = 1.70158;
    var c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  function animateFlip() {
    var elapsed = performance.now() - startTime;
    var progress = Math.min(elapsed / duration, 1);
    var eased = easeOutBack(progress);

    var rx = startX + (targetX - startX) * eased;
    var ry = startY + (targetY - startY) * eased;

    // Parabolic bounce
    var bounce = Math.sin(progress * Math.PI) * 1.5;

    coinGroup.rotation.x = rx;
    coinGroup.rotation.y = ry;
    coinGroup.position.y = startPosY + bounce;

    // Tick sounds
    var currentTick = Math.floor(rx / (Math.PI / 2));
    if (currentTick > tickCount && progress < 0.85) {
      tickCount = currentTick;
      playSpinTick();
    }

    // Dynamic light intensity during spin
    keyLight.intensity = 1.8 + Math.sin(rx * 2) * 0.5;

    if (progress < 1) {
      requestAnimationFrame(animateFlip);
    } else {
      coinRotation.x = targetX;
      coinRotation.y = targetY;
      coinGroup.position.y = startPosY;
      isFlipping = false;

      playLandSound(isHeads);
      screenShake();
      spawnCoinParticles(isHeads);

      if (isHeads) {
        totalHeads++;
        resultEl.innerHTML = '<span class="glow-heads">HEADS</span>';
      } else {
        totalTails++;
        resultEl.innerHTML = '<span class="glow-tails">TAILS</span>';
      }

      addHistory(isHeads);
      updateStats();

      // Reset light
      keyLight.intensity = 1.8;

      if (multiFlipQueue > 0) {
        multiFlipQueue--;
        setTimeout(flipCoin, 400);
      }
    }
  }
  requestAnimationFrame(animateFlip);
}

function multiFlip(n) {
  if (isFlipping) return;
  multiFlipQueue = n - 1;
  flipCoin();
}

function resetStats() {
  if (isFlipping) return;
  totalHeads = 0; totalTails = 0; history = [];
  historyBar.innerHTML = '';
  statsEl.textContent = '';
  resultEl.textContent = '';
}

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') { e.preventDefault(); flipCoin(); }
});

// ══════════════════════════════════════
// Render Loop
// ══════════════════════════════════════
var clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  var dt = clock.getDelta();

  updateIdleWobble(dt);


  renderer.render(scene, camera);
}
animate();

// ── Resize ──
window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ══════════════════════════════════════
// Webcam Drag
// ══════════════════════════════════════
var webcamWrapper = document.getElementById('webcam-wrapper');
var isDragging = false;
var dragOffsetX = 0, dragOffsetY = 0;

webcamWrapper.addEventListener('mousedown', function(e) {
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
  isDragging = true;
  webcamWrapper.classList.add('dragging');
  var rect = webcamWrapper.getBoundingClientRect();
  dragOffsetX = e.clientX - rect.left;
  dragOffsetY = e.clientY - rect.top;
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  webcamWrapper.style.right = 'auto';
  webcamWrapper.style.left = (e.clientX - dragOffsetX) + 'px';
  webcamWrapper.style.top = (e.clientY - dragOffsetY) + 'px';
});
document.addEventListener('mouseup', function() {
  isDragging = false;
  webcamWrapper.classList.remove('dragging');
});

webcamWrapper.addEventListener('touchstart', function(e) {
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
  isDragging = true;
  var touch = e.touches[0];
  var rect = webcamWrapper.getBoundingClientRect();
  dragOffsetX = touch.clientX - rect.left;
  dragOffsetY = touch.clientY - rect.top;
}, { passive: true });
document.addEventListener('touchmove', function(e) {
  if (!isDragging) return;
  var touch = e.touches[0];
  webcamWrapper.style.right = 'auto';
  webcamWrapper.style.left = (touch.clientX - dragOffsetX) + 'px';
  webcamWrapper.style.top = (touch.clientY - dragOffsetY) + 'px';
}, { passive: true });
document.addEventListener('touchend', function() { isDragging = false; });

function toggleWebcam(e) {
  e.stopPropagation();
  var container = document.getElementById('webcam-container');
  var btn = document.getElementById('webcam-toggle');
  if (container.style.display === 'none') {
    container.style.display = '';
    btn.textContent = '-';
  } else {
    container.style.display = 'none';
    btn.textContent = '+';
  }
}

// ══════════════════════════════════════
// Gesture Detection (MediaPipe Hands)
// ══════════════════════════════════════
var video = document.getElementById('webcam');
var gCanvas = document.getElementById('gesture-canvas');
var gCtx = gCanvas.getContext('2d');
var indicator = document.getElementById('gesture-indicator');
var gestureName = document.getElementById('gesture-name');

var handHistory = [];
var HISTORY_LEN = 8;
var swipeThreshold = 0.15;
var lastFlipTime = 0;
var COOLDOWN = 1500;
var lastGesture = '';
var gestureHoldStart = 0;

function updateSensitivity(val) {
  swipeThreshold = (30 - parseInt(val)) / 100;
}

function countFingersUp(lm) {
  var count = 0;
  if (lm[8].y < lm[6].y) count++;
  if (lm[12].y < lm[10].y) count++;
  if (lm[16].y < lm[14].y) count++;
  if (lm[20].y < lm[18].y) count++;
  return count;
}

function isThumbUp(lm) {
  var thumbUp = lm[4].y < lm[3].y - 0.04;
  var fingersCurled = lm[8].y > lm[6].y && lm[12].y > lm[10].y && lm[16].y > lm[14].y && lm[20].y > lm[18].y;
  return thumbUp && fingersCurled;
}

function isFist(lm) {
  return lm[8].y > lm[6].y && lm[12].y > lm[10].y && lm[16].y > lm[14].y && lm[20].y > lm[18].y && lm[4].y > lm[2].y;
}

var trailPoints = [];
var MAX_TRAIL = 15;

function drawTrail() {
  if (trailPoints.length < 2) return;
  gCtx.save();
  gCtx.beginPath();
  gCtx.moveTo(trailPoints[0].x, trailPoints[0].y);
  for (var i = 1; i < trailPoints.length; i++) {
    gCtx.lineTo(trailPoints[i].x, trailPoints[i].y);
  }
  gCtx.strokeStyle = 'rgba(255,215,0,0.6)';
  gCtx.lineWidth = 3;
  gCtx.lineCap = 'round';
  gCtx.shadowColor = '#ffd700';
  gCtx.shadowBlur = 8;
  gCtx.stroke();
  gCtx.restore();
}

function onResults(results) {
  var w = gCanvas.width = gCanvas.offsetWidth;
  var h = gCanvas.height = gCanvas.offsetHeight;
  gCtx.clearRect(0, 0, w, h);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    var landmarks = results.multiHandLandmarks[0];

    gCtx.save();
    gCtx.scale(w, h);
    drawConnectors(gCtx, landmarks, HAND_CONNECTIONS, { color: 'rgba(255,215,0,0.4)', lineWidth: 0.004 });
    drawLandmarks(gCtx, landmarks, { color: '#ffd700', lineWidth: 0.002, radius: 0.006 });
    gCtx.restore();

    trailPoints.push({ x: landmarks[0].x * w, y: landmarks[0].y * h });
    if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
    drawTrail();

    var wristY = landmarks[0].y;
    var now = Date.now();
    handHistory.push({ y: wristY, t: now });
    if (handHistory.length > HISTORY_LEN) handHistory.shift();

    if (handHistory.length >= 4) {
      var oldest = handHistory[0];
      var newest = handHistory[handHistory.length - 1];
      var dy = oldest.y - newest.y;
      var dt = newest.t - oldest.t;
      if (dy > swipeThreshold && dt < 600 && (now - lastFlipTime) > COOLDOWN) {
        lastFlipTime = now;
        handHistory = [];
        flipCoin();
        gestureName.textContent = 'SWIPE UP';
        indicator.textContent = 'Flipping!';
        lastGesture = 'swipe';
        return;
      }
    }

    if (isThumbUp(landmarks)) {
      gestureName.textContent = 'THUMBS UP';
      if (lastGesture !== 'thumbsup') { gestureHoldStart = now; lastGesture = 'thumbsup'; }
      if (now - gestureHoldStart > 600 && (now - lastFlipTime) > COOLDOWN) {
        lastFlipTime = now;
        flipCoin();
        indicator.textContent = 'Thumbs up! Flipping!';
        gestureHoldStart = now;
      } else {
        indicator.textContent = 'Hold thumbs up to flip...';
      }
      return;
    }

    if (isFist(landmarks)) {
      gestureName.textContent = 'FIST';
      if (lastGesture !== 'fist') { gestureHoldStart = now; lastGesture = 'fist'; }
      if (now - gestureHoldStart > 1000 && !isFlipping) {
        resetStats();
        indicator.textContent = 'Stats reset!';
        gestureHoldStart = now + 3000;
      } else {
        indicator.textContent = 'Hold fist to reset...';
      }
      return;
    }

    var fingersUp = countFingersUp(landmarks);
    if (fingersUp >= 4) {
      gestureName.textContent = 'OPEN HAND';
      indicator.textContent = 'Swipe UP to flip!';
    } else {
      gestureName.textContent = '';
      indicator.textContent = 'Show a gesture...';
    }
    lastGesture = 'open';

  } else {
    gestureName.textContent = '';
    indicator.textContent = 'No hand detected';
    handHistory = [];
    trailPoints = [];
    lastGesture = '';
  }
}

function initHands() {
  var hands = new Hands({
    locateFile: function(file) {
      return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/' + file;
    }
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5
  });
  hands.onResults(onResults);

  var cam = new Camera(video, {
    onFrame: async function() { await hands.send({ image: video }); },
    width: 320,
    height: 240,
    facingMode: 'user'
  });
  cam.start();
  indicator.textContent = 'Detecting hands...';
}

async function startCamera() {
  document.getElementById('permission-overlay').style.display = 'none';
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 320, height: 240 }
    });
    video.srcObject = stream;
    await video.play();
    initHands();
  } catch(e) {
    indicator.textContent = 'Camera denied. Use click/space.';
    console.error(e);
  }
}
</script>
